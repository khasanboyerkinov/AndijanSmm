<script>
  
  const TG_LINK = "https://t.me/Hasanboy_ooo"; // profilingiz

  const form = document.getElementById("regForm");
  const nameInput = document.getElementById("name");
  const birthInput = document.getElementById("birth");
  const msgInput = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");
  const hint = document.getElementById("formHint");

  // Sana cheklovi: 2015-12-31 dan keyin bo‘lmasin
  birthInput.max = "2008-12-31";

  function validateForm(){
    const nameOk = nameInput.value.trim().length >= 2;
    const birthOk = !!birthInput.value && new Date(birthInput.value) <= new Date("2008-12-31");
    const msgOk = msgInput.value.trim().length >= 5;

    const allOk = nameOk && birthOk && msgOk;
    submitBtn.disabled = !allOk;
    hint.textContent = allOk ? "Ro‘yxatdan o‘tishga tayyor ✅" : "Barcha malumotlarni to‘ldiring";
  }

  nameInput.addEventListener("input", validateForm);
  birthInput.addEventListener("change", validateForm);
  msgInput.addEventListener("input", validateForm);

  form.addEventListener("submit", function(e){
    e.preventDefault();
    // Hammasi to‘g‘ri bo‘lsa — Telegram profilingizga o‘tadi
    window.location.href = TG_LINK;
  });
</script>
